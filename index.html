            <p class="text-sm text-gray-700"><strong>User: </strong> <span id="username" class="font-mono"></span></p>
            <p class="text-sm text-gray-700 break-all mt-2"><strong>Access Token: </strong> <span id="token" class="text-xs text-gray-400 font-mono"></span></p>
            <button onclick="logout()" class="mt-6 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded w-full transition duration-200">
                Logout
            </button>
        </div>
    </div>
